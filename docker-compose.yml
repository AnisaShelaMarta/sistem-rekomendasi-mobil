services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sirekmobil_app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "9000:9000"
    volumes:
      - ./:/var/www/html
    user: "1000:1000"
    networks:
      - sirekmobil_network
    depends_on:
      mysql:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_DATABASE: laravel
      DB_USERNAME: sirekmobil_user
      DB_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "ls /proc/1/exe || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mysql:
    image: mysql:8.0
    container_name: sirekmobil_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: sirekmobil_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/laravel.sql:/docker-entrypoint-initdb.d/laravel.sql
    networks:
      - sirekmobil_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: sirekmobil_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sirekmobil_network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ls /proc/1/exe || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: sirekmobil_tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - sirekmobil_network
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ls /proc/1/exe || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  sirekmobil_network:
    driver: bridge

volumes:
  mysql_data:
