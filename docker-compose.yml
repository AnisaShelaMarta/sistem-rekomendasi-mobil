services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sirekmobil_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - app_storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    networks:
      - sirekmobil_network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mysql:
    image: mysql:8.0
    container_name: sirekmobil_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: sirekmobil_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/laravel.sql:/docker-entrypoint-initdb.d/laravel.sql
    networks:
      - sirekmobil_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: sirekmobil_tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - sirekmobil_network
    depends_on:
      app:
        condition: service_healthy

networks:
  sirekmobil_network:
    driver: bridge

volumes:
  mysql_data:
  app_storage:
